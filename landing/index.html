<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whamail — Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 1rem;
      padding: 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }
    .sub {
      color: #a1a1aa;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .version-badge {
      display: inline-block;
      background: #27272a;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      color: #a1a1aa;
      margin-bottom: 2rem;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: all .15s ease;
      margin-bottom: 0.75rem;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary {
      background: #27272a;
      color: #fafafa;
      border: 1px solid #3f3f46;
    }
    .btn-secondary:hover { background: #3f3f46; }
    .btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #52525b;
    }
    .footer a { color: #a1a1aa; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .loading { color: #52525b; font-size: 0.9rem; }
    .error { color: #ef4444; font-size: 0.85rem; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Whamail</h1>
    <p class="sub">Email broadcast platform — desktop app</p>

    <div class="version-badge" id="version">v<span id="ver">—</span></div>

    <div id="loading" class="loading">Checking for latest version…</div>
    <div id="error" class="error"></div>
    <div id="buttons" style="display:none">
      <a class="btn btn-primary" id="link-win" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
        Download for Windows
      </a>
      <a class="btn btn-secondary" id="link-mac-arm" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06Z"/></svg>
        macOS (Apple Silicon)
      </a>
      <a class="btn btn-secondary" id="link-mac-x64" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06Z"/></svg>
        macOS (Intel)
      </a>
    </div>

    <div class="footer">
      <a href="https://github.com/krishna-dharsandia/whamail/releases">View all releases on GitHub</a>
    </div>
  </div>

  <script>
    // ─── Auto-detect latest version from GitHub API ───
    const REPO = "krishna-dharsandia/whamail";

    async function load() {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
        if (res.status === 404) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").textContent = "No release published yet. Check back soon.";
          document.getElementById("error").style.display = "block";
          return;
        }
        if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
        const release = await res.json();
        const tag = release.tag_name;           // e.g. "v1.0.1"
        const ver = tag.replace(/^v/, "");      // "1.0.1"

        document.getElementById("ver").textContent = ver;

        const base = `https://github.com/${REPO}/releases/latest/download/Whamail.Setup.${ver}.exe`;
        const macArm = `https://github.com/${REPO}/releases/latest/download/Whamail-${ver}-arm64.dmg`;
        const macX64 = `https://github.com/${REPO}/releases/latest/download/Whamail-${ver}-x64.dmg`;

        document.getElementById("link-win").href = base;
        document.getElementById("link-mac-arm").href = macArm;
        document.getElementById("link-mac-x64").href = macX64;

        document.getElementById("loading").style.display = "none";
        document.getElementById("buttons").style.display = "block";
      } catch (err) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").textContent = "Could not fetch latest version. " + err.message;
        document.getElementById("error").style.display = "block";
      }
    }

    load();
  </script>
</body>
</html>
