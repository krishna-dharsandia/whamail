name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - run: npm ci
        working-directory: desktop

      - run: npm run electron:build:win
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload installer + latest.yml (needed for auto-updater)
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/Whamail-Setup-*-x64.exe
            desktop/dist/latest.yml
          generate_release_notes: true

  build-mac-arm64:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - run: npm ci
        working-directory: desktop

      - run: npm run electron:build:mac-arm64
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign (no Apple Developer ID)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Remove macOS quarantine attribute from DMG before upload
      - name: Remove quarantine xattr
        run: xattr -cr desktop/dist/*.dmg desktop/dist/*.zip 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/Whamail-*-arm64.dmg
            desktop/dist/Whamail-*-arm64.zip
            desktop/dist/latest-mac.yml
          generate_release_notes: true

  build-mac-x64:
    runs-on: macos-13
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - run: npm ci
        working-directory: desktop

      - run: npm run electron:build:mac-x64
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Remove quarantine xattr
        run: xattr -cr desktop/dist/*.dmg desktop/dist/*.zip 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/Whamail-*-x64.dmg
            desktop/dist/Whamail-*-x64.zip
            desktop/dist/latest-mac.yml
          generate_release_notes: true
