name: Build & Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - run: npm ci
        working-directory: desktop

      - run: npm run electron:build:win
        working-directory: desktop

      # Upload only .exe to the user-facing release
      - uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/Whamail-Setup-*-x64.exe

      # Upload auto-update files to dedicated "autoupdate" release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: autoupdate
          name: Auto-Update Files (do not download manually)
          prerelease: true
          files: |
            desktop/dist/Whamail-Setup-*-x64.exe
            desktop/dist/latest.yml

  build-mac-arm64:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - run: npm ci
        working-directory: desktop

      - run: npm run electron:build:mac-arm64
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Remove quarantine xattr
        run: xattr -cr desktop/dist/*.dmg desktop/dist/*.zip 2>/dev/null || true

      # Upload only .dmg to user-facing release
      - uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/Whamail-*-arm64.dmg

      # Upload auto-update files to dedicated "autoupdate" release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: autoupdate
          name: Auto-Update Files (do not download manually)
          prerelease: true
          files: |
            desktop/dist/Whamail-*-arm64.zip
            desktop/dist/latest-mac.yml

  build-mac-x64:
    runs-on: macos-13
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - run: npm ci
        working-directory: desktop

      - run: npm run electron:build:mac-x64
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Remove quarantine xattr
        run: xattr -cr desktop/dist/*.dmg desktop/dist/*.zip 2>/dev/null || true

      # Upload only .dmg to user-facing release
      - uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/Whamail-*-x64.dmg

      # Upload auto-update files to dedicated "autoupdate" release
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: autoupdate
          name: Auto-Update Files (do not download manually)
          prerelease: true
          files: |
            desktop/dist/Whamail-*-x64.zip
            desktop/dist/latest-mac.yml
