appId: app.whamail.desktop
productName: Whamail
executableName: Whamail
copyright: Copyright © 2026 Whamail

directories:
  output: dist
  buildResources: build

files:
  - dist-electron/**/*
  - out/**/*
  - package.json
  - public/**/*

extraResources:
  - from: api/publish
    to: api
    filter:
      - "**/*"

compression: normal

protocols:
  name: Whamail
  schemes:
    - whamail

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Whamail-Setup-${version}-${arch}.exe
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Whamail
  artifactName: Whamail-Setup-${version}-${arch}.exe

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: Whamail-${version}-${arch}.dmg
  category: public.app-category.productivity
  hardenedRuntime: true
  icon: build/icon.icns

dmg:
  title: Whamail ${version}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
