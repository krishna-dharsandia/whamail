appId: app.whamail.desktop
productName: Whamail
executableName: Whamail
copyright: Copyright © 2026 Whamail

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - out/**/*
  - package.json
  - public/**/*

extraResources:
  - from: api/publish
    to: api
    filter:
      - "**/*"

win:
  target:
    - target: portable
      arch:
        - x64
        - ia32
  artifactName: Whamail-${arch}.exe
  icon: build/icon.png

portable:
  requestExecutionLevel: user
  unpackDirName: Whamail

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: Whamail-${version}-${arch}.dmg
  category: public.app-category.productivity
  hardenedRuntime: true
  icon: build/icon.png

dmg:
  title: Whamail ${version}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Network
  icon: build/icons
